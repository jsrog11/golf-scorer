<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flight & Skins — Score Entry</title>
<style>
:root{
  --b0:#0a0a0f;--b1:#12121a;--b2:#16161f;--b3:#1e1e2a;--b4:#252535;
  --e1:#252540;--e2:#2e2e52;--e3:#3a3a6a;
  --t1:#efefef;--t2:#8888aa;--t3:#44445a;
  --green:#4caf50;--green-bg:rgba(76,175,80,.13);--green-b:rgba(76,175,80,.35);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.12);--amber-b:rgba(245,166,35,.35);
  --red:#ef5350;--red-bg:rgba(239,83,80,.13);--red-b:rgba(239,83,80,.35);
  --blue:#42a5f5;--teal:#26c6da;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--b0);color:var(--t1);font-size:15px}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.app-header{
  background:var(--b1);border-bottom:1px solid var(--e2);
  padding:10px 16px;flex-shrink:0;
}
.app-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.app-title{font-size:.85rem;font-weight:700;color:var(--t1)}
.app-sub{font-size:.7rem;color:var(--t2)}
.live-pill{background:var(--green-bg);border:1px solid var(--green-b);color:var(--green);padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;font-family:monospace;display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TAB BAR */
.tab-bar{
  background:var(--b1);border-top:1px solid var(--e2);
  display:flex;flex-shrink:0;
}
.tab-btn{
  flex:1;padding:10px 4px 8px;text-align:center;border:none;
  background:transparent;color:var(--t3);font-size:.72rem;font-weight:500;
  cursor:pointer;transition:color .15s;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tab-btn.active{color:var(--green)}
.tab-icon{font-size:1.1rem;line-height:1}

/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;padding:14px}
.screen.active{display:block}

/* ── SCORE ENTRY ── */
.hole-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.hole-btn{
  width:34px;height:30px;border-radius:5px;border:1px solid var(--e2);
  background:var(--b3);color:var(--t2);font-size:.75rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-family:monospace;
}
.hole-btn.current{background:var(--b4);border-color:var(--e3);color:var(--t1);box-shadow:0 0 0 2px rgba(58,58,106,.5)}
.hole-btn.birdie{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.hole-btn.par{background:var(--b3);border-color:var(--e2);color:var(--t2)}
.hole-btn.bogey{background:var(--red-bg);border-color:var(--red-b);color:var(--red)}
.hole-btn.eagle{background:var(--amber-bg);border-color:var(--amber-b);color:var(--amber)}
.hole-btn.double{background:rgba(239,83,80,.25);border-color:#c62828;color:#ffcdd2}

.hole-card{background:var(--b2);border:1px solid var(--e2);border-radius:10px;padding:14px;margin-bottom:12px}
.hole-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hole-num{font-size:1.3rem;font-weight:700;color:var(--t1)}
.hole-info{font-size:.75rem;color:var(--t2);margin-top:2px}
.stroke-badge{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber);padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600}

/* Player score rows */
.player-score-row{
  background:var(--b3);border:1px solid var(--e1);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;
}
.player-score-row:last-child{margin-bottom:0}
.psr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.psr-name{font-weight:600;font-size:.9rem;color:var(--t1)}
.psr-meta{font-size:.7rem;color:var(--t2);margin-top:1px}
.psr-controls{display:flex;align-items:center;gap:0}
.score-minus,.score-plus{
  width:44px;height:44px;border-radius:8px;border:1px solid var(--e2);
  background:var(--b4);color:var(--t1);font-size:1.4rem;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .1s;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.score-minus:active,.score-plus:active{background:var(--e2)}
.score-display{
  width:56px;height:44px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:monospace;font-weight:700;
}
.score-num{font-size:1.6rem;line-height:1;color:var(--t1)}
.score-label{font-size:.58rem;font-weight:600;letter-spacing:.3px;margin-top:2px}
.score-label.eagle{color:var(--amber)}
.score-label.birdie{color:var(--green)}
.score-label.par{color:var(--t3)}
.score-label.bogey{color:var(--red)}
.score-label.double{color:#ef5350}
.score-label.triple{color:#c62828}

/* Score cell highlight */
.psr-birdie .score-num{color:var(--green)}
.psr-bogey .score-num{color:var(--red)}
.psr-eagle .score-num{color:var(--amber)}
.psr-double .score-num{color:#ef5350}

.save-hole-btn{
  width:100%;padding:13px;border-radius:8px;border:none;
  background:var(--green);color:#fff;font-size:.95rem;font-weight:700;
  cursor:pointer;margin-top:10px;transition:filter .15s;
  font-family:inherit;
}
.save-hole-btn:active{filter:brightness(.9)}
.save-hole-btn.saved{background:var(--b4);color:var(--green);border:1px solid var(--green-b)}

/* Mini scorecard */
.mini-card{background:var(--b2);border:1px solid var(--e1);border-radius:8px;overflow:hidden;margin-top:12px}
.mini-card-title{font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:7px 10px;border-bottom:1px solid var(--e1)}
.mini-table{width:100%;border-collapse:collapse;font-size:.75rem}
.mini-table th{background:var(--b3);padding:5px 6px;text-align:center;color:var(--t2);font-size:.65rem;font-weight:600;border-bottom:1px solid var(--e2)}
.mini-table th:first-child{text-align:left;padding-left:10px}
.mini-table td{padding:4px 6px;text-align:center;border-bottom:1px solid var(--e1);color:var(--t1)}
.mini-table td:first-child{text-align:left;padding-left:10px;color:var(--t2);font-family:monospace}
.mini-table tr:last-child td{border-bottom:none}
.mini-sc-birdie{color:var(--green);font-weight:700}
.mini-sc-bogey{color:var(--red)}
.mini-sc-eagle{color:var(--amber);font-weight:700}
.mini-sc-double{color:#ef5350}

/* ── LEADERBOARD ── */
.lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lb-title{font-size:.85rem;font-weight:700;color:var(--t1)}
.lb-sync{font-size:.68rem;color:var(--t3);font-family:monospace}
.flight-toggle{display:flex;gap:4px;background:var(--b3);border-radius:6px;padding:3px}
.ft-btn{padding:4px 12px;border-radius:4px;border:none;font-size:.72rem;font-weight:600;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;transition:all .12s}
.ft-btn.active{background:var(--b4);color:var(--t1);border:1px solid var(--e2)}
.lb-winner-banner{
  background:var(--amber-bg);border:1px solid var(--amber-b);
  border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.lb-winner-crown{font-size:1.3rem}
.lb-winner-label{font-size:.62rem;color:var(--amber);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:1px}
.lb-winner-name{font-size:.95rem;font-weight:700;color:var(--t1)}
.lb-winner-score{font-family:monospace;font-size:1.3rem;font-weight:700;color:var(--amber);margin-left:auto}
.lb-row{
  background:var(--b2);border:1px solid var(--e1);border-radius:7px;
  padding:9px 12px;margin-bottom:5px;
  display:flex;align-items:center;gap:10px;
}
.lb-row.you-row{border-color:var(--e3);background:var(--b3)}
.lb-rank{width:24px;height:24px;border-radius:50%;background:var(--b4);color:var(--t2);display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:.75rem;font-weight:700;flex-shrink:0}
.lb-rank.r1{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.87rem;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.you-badge{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);padding:1px 6px;border-radius:3px;font-size:.6rem;font-weight:700;font-family:monospace;flex-shrink:0}
.lb-progress{display:flex;align-items:center;gap:6px;margin-top:3px}
.lb-prog-bar{flex:1;height:3px;background:var(--b4);border-radius:2px;overflow:hidden;max-width:80px}
.lb-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.lb-holes-left{font-size:.65rem;color:var(--t3);font-family:monospace;white-space:nowrap}
.lb-score{font-family:monospace;font-size:1rem;font-weight:700;min-width:36px;text-align:right}
.lb-score.under{color:var(--green)}
.lb-score.over{color:var(--red)}
.lb-score.even{color:var(--t1)}
.flight-divider{font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;border-bottom:1px solid var(--e1);margin-bottom:8px}

/* ── ROUND COMPLETE ── */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;min-height:60vh}
.complete-icon{font-size:3rem;margin-bottom:16px}
.complete-title{font-size:1.2rem;font-weight:700;color:var(--t1);margin-bottom:8px}
.complete-sub{font-size:.85rem;color:var(--t2);line-height:1.6}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--e2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.82rem;color:var(--t2)}

/* UTILS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--b0)}
::-webkit-scrollbar-thumb{background:var(--e3);border-radius:2px}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading your scorecard...</div>
</div>

<!-- App (hidden until loaded) -->
<div class="app" id="app-shell" style="display:none">

  <div class="app-header">
    <div class="app-header-top">
      <div>
        <div class="app-title" id="app-title">Flight & Skins</div>
        <div class="app-sub" id="app-sub">Loading...</div>
      </div>
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>

  <!-- Score Entry Screen -->
  <div class="screen active" id="screen-card">
    <div class="hole-nav" id="hole-nav"></div>
    <div class="hole-card">
      <div class="hole-card-header">
        <div>
          <div class="hole-num" id="curr-hole-title">Hole 1</div>
          <div class="hole-info" id="curr-hole-info">Par 4 · SI 1</div>
        </div>
        <div id="curr-stroke-badge"></div>
      </div>
      <div id="player-score-rows"></div>
      <button class="save-hole-btn" id="save-hole-btn" onclick="saveHole()">Save Hole & Next →</button>
    </div>
    <div class="mini-card">
      <div class="mini-card-title">Your round so far</div>
      <div style="overflow-x:auto">
        <table class="mini-table" id="mini-scorecard">
          <thead><tr id="mini-head"></tr></thead>
          <tbody id="mini-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Leaderboard Screen -->
  <div class="screen" id="screen-leaderboard">
    <div class="lb-header">
      <div class="lb-title">Leaderboard</div>
      <div class="lb-sync" id="lb-sync-time">—</div>
    </div>
    <div id="lb-content"></div>
  </div>

  <!-- Round Complete Screen -->
  <div class="screen" id="screen-complete">
    <div class="complete-screen">
      <div class="complete-icon">🏁</div>
      <div class="complete-title">Round Complete</div>
      <div class="complete-sub">All scores have been submitted.<br>The scorer has closed the round.<br><br>Thanks for playing!</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-card" onclick="switchTab('card')">
      <span class="tab-icon">⛳</span>My Card
    </button>
    <button class="tab-btn" id="tab-leaderboard" onclick="switchTab('leaderboard')">
      <span class="tab-icon">🏆</span>Leaderboard
    </button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  PLAYER PAGE STATE
// ═══════════════════════════════════════════
const P = {
  groupNum: null,
  sessionId: '',
  sheetId: '',
  players: [],      // players in this group
  scores: {},       // pid -> {hole: score}
  pars: [],
  si: [],
  numHoles: 18,
  fAN: 'A Flight',
  fBN: 'B Flight',
  hCut: 18,
  currentHole: 0,
  sessionActive: true,
  leaderboard: [],  // all players for leaderboard
  lastSync: null,
  syncQueue: [],    // offline queue
};

// ═══════════════════════════════════════════
//  INIT — READ URL PARAMS
// ═══════════════════════════════════════════
function init(){
  const params = new URLSearchParams(window.location.search);
  P.groupNum  = params.get('group');
  P.sessionId = params.get('session')||'';
  P.sheetId   = params.get('sheet') || '19zm2vF0458rO-MpPHfs0tT4D6Cg0Cn9eMREK4bnT3n4';
  P.apiKey    = params.get('key') || '';

  // Load pars and SI directly from URL if provided
  try {
    var parsParam = params.get('pars');
    var siParam   = params.get('si');
    var holesParam = params.get('holes');
    if(parsParam) P.pars = JSON.parse(parsParam);
    if(siParam)   P.si   = JSON.parse(siParam);
    if(holesParam) P.numHoles = parseInt(holesParam)||18;
  } catch(e){ console.warn('Could not parse pars/si from URL', e); }
  P.numHoles  = parseInt(params.get('holes'))||18;
  // Decode pars and si if passed in URL
  var parsParam = params.get('pars');
  var siParam   = params.get('si');
  if(parsParam) try{ P.pars = JSON.parse(decodeURIComponent(parsParam)); }catch(e){}
  if(siParam)   try{ P.si   = JSON.parse(decodeURIComponent(siParam));   }catch(e){}

  if(!P.groupNum){
    showError('No group specified. Please scan your group QR code again.');
    return;
  }

  setLoading('Loading group ' + P.groupNum + ' scorecard...');

  // Try to load from localStorage (offline cache)
  loadFromCache();

  // Then try to fetch from Sheet
  fetchSessionData();
}

function loadFromCache(){
  try {
    const raw = localStorage.getItem('player_session_' + P.sessionId + '_g' + P.groupNum);
    if(!raw) return;
    const data = JSON.parse(raw);
    applySessionData(data);
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app-shell').style.display='flex';
  } catch(e){}
}

function saveToCache(){
  try {
    const data = {
      players: P.players,
      scores: P.scores,
      pars: P.pars,
      si: P.si,
      numHoles: P.numHoles,
      fAN: P.fAN,
      fBN: P.fBN,
      hCut: P.hCut,
      leaderboard: P.leaderboard,
    };
    localStorage.setItem('player_session_' + P.sessionId + '_g' + P.groupNum, JSON.stringify(data));
  } catch(e){}
}

// ═══════════════════════════════════════════
//  SHEET FETCH — STUBBED, READY FOR API KEY
// ═══════════════════════════════════════════
function fetchSessionData(){
  if(!P.sheetId || !P.sessionId){
    setLoading('No session found — using demo data');
    if(!P.players.length) loadDemoData();
    setTimeout(showApp, 1000);
    return;
  }
  // Tab name is passed directly in URL — use it immediately
  var tabParam = (new URLSearchParams(window.location.search)).get('tab');
  P.tabName = tabParam || '';

  if(P.tabName){
    setLoading('Loading group ' + P.groupNum + ' from sheet...');
    pullSessionFromSheet();
  } else {
    setLoading('Finding your session...');
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + P.sheetId +
      '?key=' + P.apiKey + '&fields=sheets.properties.title';
    fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){
        setLoading('⚠ ' + data.error.message);
        if(!P.players.length) loadDemoData();
        setTimeout(showApp, 2000);
        return;
      }
      var sheets = data.sheets||[];
      if(sheets.length){
        var tabs = sheets.filter(function(s){return s.properties.title!=='Sheet1';});
        P.tabName = tabs.length ? tabs[tabs.length-1].properties.title : sheets[sheets.length-1].properties.title;
        pullSessionFromSheet();
      } else {
        setLoading('No session tab found');
        if(!P.players.length) loadDemoData();
        setTimeout(showApp, 1500);
      }
    }).catch(function(e){
      setLoading('⚠ Connection error — check internet');
      if(!P.players.length) loadDemoData();
      setTimeout(showApp, 1500);
    });
  }
}

function pullSessionFromSheet(){
  setLoading('Loading scores from sheet...');
  // Escape single quotes in tab name for Sheets API range notation
  var safeTab = P.tabName.replace(/'/g, "''");
  var range = encodeURIComponent("'" + safeTab + "'!A1:ZZ200");
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + P.sheetId +
    '/values/' + range + '?key=' + P.apiKey;
  fetch(url)
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){
      // Tab doesn't exist yet — fall through to URL data which already has pars/SI
      console.warn('Sheet tab not ready:', data.error.message);
      if(!P.players.length) loadDemoData();
      showApp();
      return;
    }
    var rows = data.values||[];
    if(rows.length<2){
      if(!P.players.length) loadDemoData();
      showApp();
      return;
    }
    var headers = rows[0];
    var pidIdx  = headers.indexOf('PlayerID');
    var nameIdx = headers.indexOf('PlayerName');
    var fltIdx  = headers.indexOf('Flight');
    var grpIdx  = headers.indexOf('Group');
    var hcpIdx  = headers.indexOf('HCP');
    var h1Idx   = headers.indexOf('H1');
    if(pidIdx<0 || h1Idx<0){
      if(!P.players.length) loadDemoData();
      showApp();
      return;
    }
    // Count holes from header
    var hCount=0;
    while(h1Idx+hCount<headers.length && /^H\d+$/.test(headers[h1Idx+hCount])) hCount++;
    P.numHoles = hCount||18;
    // Build players and scores
    var allPlayers = [];
    var myGroup = parseInt(P.groupNum)||1;
    rows.slice(1).forEach(function(row){
      var grp = parseInt(row[grpIdx])||0;
      var pid = row[pidIdx]||'';
      if(!pid) return;
      var p = {
        id:pid,
        name:row[nameIdx]||'Player',
        flight:row[fltIdx]||'A',
        group:grp,
        hdcp:parseInt(row[hcpIdx])||0
      };
      allPlayers.push(p);
      // Init scores for everyone
      if(!P.scores[pid]) P.scores[pid]={};
      if(grp===myGroup){
        for(var h=0;h<P.numHoles;h++){
          var val=row[h1Idx+h];
          if(val!==undefined&&val!==''){
            var s=parseInt(val);
            if(!isNaN(s)&&s>0) P.scores[pid][h]=s;
          }
        }
      }
    });
    // Players in my group
    P.players = allPlayers.filter(function(p){return p.group===myGroup;});
    if(!P.players.length){
      // fallback — show all players if group assignment not found
      P.players = allPlayers.slice(0,4);
    }
    // All players for leaderboard
    P.leaderboard = allPlayers.map(function(p){
      var arr=Object.entries(P.scores[p.id]||{});
      return Object.assign({},p,{scores:P.scores[p.id]||{},holesPlayed:arr.length,rel:9999});
    });
    // Default pars and SI if not set
    if(!P.pars.length || P.pars.every(function(v){return !v;})){
      var d=defaultParsAndSI(P.numHoles);
      P.pars=d.pars; P.si=d.si;
    }
    saveToCache();
    showApp();
  }).catch(function(e){
    console.error('pullSessionFromSheet error:',e);
    if(!P.players.length) loadDemoData();
    showApp();
  });
}

function defaultParsAndSI(n){
  var p=[4,4,3,4,5,3,4,5,4,4,4,3,5,4,4,3,5,4];
  var s=[1,7,15,11,3,17,5,9,13,2,8,16,12,4,18,6,10,14];
  return {pars:p.slice(0,n), si:s.slice(0,n)};
}

function showApp(){
  // Always ensure pars and SI are set before rendering
  if(!P.pars.length || P.pars.length < P.numHoles){
    var d = defaultParsAndSI(P.numHoles||18);
    if(!P.pars.length) P.pars = d.pars;
    if(!P.si.length)   P.si   = d.si;
  }
  // Ensure scores object exists for all players
  P.players.forEach(function(p){ if(!P.scores[p.id]) P.scores[p.id]={}; });
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  render();
}

function pushScoresToSheet(hole, pid, score){
  P.syncQueue.push({hole:hole, pid:pid, score:score, ts:Date.now()});
  saveToCache();
  if(!P.sheetId||!P.tabName){ return; }
  // Find the column for this hole and row for this player
  var range = encodeURIComponent("'"+P.tabName+"'!A1:B200");
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + P.sheetId +
    '/values/' + range + '?key=' + P.apiKey)
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error) return;
    var rows = data.values||[];
    var headers = rows[0]||[];
    var pidIdx = headers.indexOf('PlayerID');
    var h1Idx  = headers.indexOf('H1');
    if(pidIdx<0||h1Idx<0) return;
    var rowNum=-1;
    for(var i=1;i<rows.length;i++){
      if(rows[i][pidIdx]===pid){rowNum=i+1;break;}
    }
    if(rowNum<0) return;
    var col = colLetter(h1Idx+1+hole);
    var cellRange = encodeURIComponent("'"+P.tabName+"'!"+col+rowNum);
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + P.sheetId +
      '/values/' + cellRange + '?valueInputOption=RAW&key=' + P.apiKey, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({range:"'"+P.tabName+"'!"+col+rowNum,majorDimension:'ROWS',values:[[score]]})
    }).then(function(){
      // Remove from queue on success
      P.syncQueue = P.syncQueue.filter(function(q){return !(q.hole===hole&&q.pid===pid);});
    }).catch(function(e){console.error('pushScore PUT error:',e);});
  }).catch(function(e){console.error('pushScore lookup error:',e);});
}

function colLetter(n){
  var s=''; while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);} return s;
}

function fetchLeaderboard(){
  if(!P.sheetId||!P.tabName){ buildLeaderboardFromLocal(); return; }
  var range = encodeURIComponent("'"+P.tabName+"'!A1:ZZ200");
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + P.sheetId +
    '/values/' + range + '?key=' + P.apiKey)
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){ buildLeaderboardFromLocal(); return; }
    var rows=data.values||[];
    if(rows.length<2){ buildLeaderboardFromLocal(); return; }
    var headers=rows[0];
    var pidIdx=headers.indexOf('PlayerID');
    var nameIdx=headers.indexOf('PlayerName');
    var fltIdx=headers.indexOf('Flight');
    var hcpIdx=headers.indexOf('HCP');
    var h1Idx=headers.indexOf('H1');
    if(pidIdx<0||h1Idx<0){ buildLeaderboardFromLocal(); return; }
    var hCount=0;
    while(h1Idx+hCount<headers.length&&headers[h1Idx+hCount].match(/^H\d+$/)) hCount++;
    var cPar=P.pars.reduce(function(a,b){return a+(b||4);},0);
    P.leaderboard = rows.slice(1).map(function(row){
      var pid=row[pidIdx]||'';
      var hdcp=parseInt(row[hcpIdx])||0;
      var scores={};
      for(var h=0;h<hCount;h++){
        var v=row[h1Idx+h];
        if(v!==undefined&&v!==''){var s=parseInt(v);if(!isNaN(s)&&s>0)scores[h]=s;}
      }
      var arr=Object.entries(scores);
      var tn=arr.reduce(function(acc,e){
        var h=+e[0],g=e[1],str=strokesOn(hdcp,h);
        return acc+(g-str);
      },0);
      return {
        id:pid,name:row[nameIdx]||'',flight:row[fltIdx]||'A',
        hdcp:hdcp,scores:scores,holesPlayed:arr.length,
        rel:arr.length?tn-cPar:9999
      };
    }).filter(function(p){return p.id;});
    // Update local scores for our group players
    P.players.forEach(function(p){
      var lb=P.leaderboard.find(function(l){return l.id===p.id;});
      if(lb&&lb.scores){
        Object.entries(lb.scores).forEach(function(e){P.scores[p.id][+e[0]]=e[1];});
      }
    });
    renderLeaderboard();
  }).catch(function(e){console.error('fetchLeaderboard error:',e);buildLeaderboardFromLocal();});
}

// ═══════════════════════════════════════════
//  DEMO DATA (used until Sheet is connected)
// ═══════════════════════════════════════════
function loadDemoData(){
  var d = defaultParsAndSI(18);
  P.pars = d.pars;
  P.si   = d.si;
  P.numHoles = 18;
  P.fAN = 'A Flight';
  P.fBN = 'B Flight';
  P.hCut = 18;
  var gNum = parseInt(P.groupNum)||1;
  // Show placeholder players so UI is usable
  P.players = [
    {id:'p_demo1',name:'Player 1',hdcp:9, flight:'A',group:gNum},
    {id:'p_demo2',name:'Player 2',hdcp:14,flight:'A',group:gNum},
  ];
  P.players.forEach(function(p){ if(!P.scores[p.id]) P.scores[p.id]={}; });
  P.leaderboard = P.players.map(function(p){
    return Object.assign({},p,{scores:{},holesPlayed:0,rel:9999});
  });
}

function applySessionData(data){
  if(data.players) P.players = data.players;
  if(data.scores)  P.scores  = data.scores;
  if(data.pars)    P.pars    = data.pars;
  if(data.si)      P.si      = data.si;
  if(data.numHoles) P.numHoles = data.numHoles;
  if(data.fAN)     P.fAN     = data.fAN;
  if(data.fBN)     P.fBN     = data.fBN;
  if(data.hCut)    P.hCut    = data.hCut;
  if(data.leaderboard) P.leaderboard = data.leaderboard;
}

// ═══════════════════════════════════════════
//  STROKE CALC
// ═══════════════════════════════════════════
function strokesOn(hdcp, hole){
  var si = (P.si && P.si[hole]) ? P.si[hole] : 0;
  if(!si) return 0;
  var n = P.numHoles || 18;
  return Math.floor(hdcp/n) + ((hdcp%n)>=si?1:0);
}

function getScoreLabel(gross, par){
  if(gross===undefined||gross===null) return '';
  const d = gross - par;
  if(d<=-2) return 'eagle';
  if(d===-1) return 'birdie';
  if(d===0)  return 'par';
  if(d===1)  return 'bogey';
  if(d===2)  return 'double';
  return 'triple';
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  if(!P.sessionActive){
    showCompleteScreen();
    return;
  }
  document.getElementById('app-title').textContent = 'Group ' + P.groupNum + ' — Score Entry';
  const courseName = 'Club Championship';
  document.getElementById('app-sub').textContent = courseName + ' · ' + P.numHoles + ' Holes';
  renderHoleNav();
  renderCurrentHole();
  renderMiniScorecard();
}

function renderHoleNav(){
  const nav = document.getElementById('hole-nav');
  let html = '';
  for(let h=0;h<P.numHoles;h++){
    // Determine color based on group scores
    let cls = '';
    const allEntered = P.players.every(function(p){
      return P.scores[p.id] && P.scores[p.id][h]!==undefined;
    });
    if(allEntered && P.players.length){
      // Use first player's score for color
      const p0 = P.players[0];
      const g = P.scores[p0.id][h];
      const par = P.pars[h]||4;
      cls = getScoreLabel(g,par);
    }
    const isCurrent = h===P.currentHole;
    html += '<button class="hole-btn '+cls+(isCurrent?' current':'')+'" onclick="goToHole('+h+')">'+(h+1)+'</button>';
  }
  nav.innerHTML = html;
}

function renderCurrentHole(){
  const h = P.currentHole;
  const par = P.pars[h]||4;
  const si  = P.si[h]||0;
  document.getElementById('curr-hole-title').textContent = 'Hole ' + (h+1);
  document.getElementById('curr-hole-info').textContent  = 'Par ' + par + ' · SI ' + si;

  // Build player rows
  let rowsHtml = '';
  if(!P.players || P.players.length===0){
    document.getElementById('player-score-rows').innerHTML =
      '<div style="color:#8888aa;font-style:italic;font-size:.85rem;padding:16px;text-align:center">'+
      'Waiting for player data...<br><span style="font-size:.75rem">Pull down to refresh or check your connection</span></div>';
    // Try to reload
    setTimeout(fetchSessionData, 3000);
    return;
  }
  P.players.forEach(function(p){
    const strokes = strokesOn(p.hdcp, h);
    const gross = P.scores[p.id] && P.scores[p.id][h]!==undefined ? P.scores[p.id][h] : null;
    const label = gross!==null ? getScoreLabel(gross, par) : '';
    const netScore = gross!==null ? gross - strokes : null;
    const netLabel = netScore!==null ? getScoreLabel(netScore, par) : '';
    const flight = p.flight==='A' ? P.fAN : P.fBN;

    rowsHtml += '<div class="player-score-row psr-'+label+'" id="psr-'+p.id+'">' +
      '<div class="psr-top">' +
        '<div>' +
          '<div class="psr-name">'+p.name+'</div>' +
          '<div class="psr-meta">HCP '+p.hdcp+' · '+flight+(strokes>0?' · <span style="color:#f5a623">'+strokes+' stroke'+(strokes>1?'s':'')+'</span>':'')+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="psr-controls">' +
        '<button class="score-minus" onclick="adjustScore(\''+p.id+'\','+h+',-1)">−</button>' +
        '<div class="score-display">' +
          '<div class="score-num" id="sn-'+p.id+'">'+(gross!==null?gross:'—')+'</div>' +
          '<div class="score-label '+label+'" id="sl-'+p.id+'">'+(label?label.toUpperCase():'')+'</div>' +
        '</div>' +
        '<button class="score-plus" onclick="adjustScore(\''+p.id+'\','+h+',1)">+</button>' +
      '</div>' +
    '</div>';
  });
  if(!P.players.length){
    rowsHtml = '<div style="color:#8888aa;font-style:italic;font-size:.85rem;padding:16px;text-align:center">Loading players from sheet...<br><br>If this persists, check your connection.</div>';
  }
  document.getElementById('player-score-rows').innerHTML = rowsHtml;

  // Stroke badge for hole
  const maxStrokes = Math.max.apply(null, P.players.map(function(p){return strokesOn(p.hdcp,h);}));
  const badgeEl = document.getElementById('curr-stroke-badge');
  badgeEl.innerHTML = maxStrokes>0
    ? '<div class="stroke-badge">'+maxStrokes+' stroke'+(maxStrokes>1?'s':'')+'</div>'
    : '';

  // Update save button — only show saved if scores actually entered
  const allEntered = P.players.length > 0 && P.players.every(function(p){
    return P.scores[p.id] && P.scores[p.id][h]!==undefined;
  });
  const anyEntered = P.players.some(function(p){
    return P.scores[p.id] && P.scores[p.id][h]!==undefined;
  });
  const btn = document.getElementById('save-hole-btn');
  if(allEntered && anyEntered){
    btn.className='save-hole-btn saved';
    btn.textContent = h<P.numHoles-1 ? '✓ Saved — Go to Hole '+(h+2)+' →' : '✓ Round Complete';
  } else {
    btn.className='save-hole-btn';
    btn.textContent = h<P.numHoles-1 ? 'Save Hole '+(h+1)+' & Next →' : 'Save Final Hole';
  }
}

function renderMiniScorecard(){
  const headEl = document.getElementById('mini-head');
  const bodyEl = document.getElementById('mini-body');

  // Header
  headEl.innerHTML = '<th>Player</th>' +
    Array.from({length:P.numHoles},function(_,i){return '<th>'+(i+1)+'</th>';}).join('') +
    '<th>TOT</th><th>NET</th>';

  // Body
  const cPar = P.pars.reduce(function(a,b){return a+(b||4);},0);
  bodyEl.innerHTML = P.players.map(function(p){
    let tg=0, tn=0, played=0;
    const cells = Array.from({length:P.numHoles},function(_,h){
      const g = P.scores[p.id] && P.scores[p.id][h]!==undefined ? P.scores[p.id][h] : null;
      if(g===null) return '<td style="color:#333">·</td>';
      const par=P.pars[h]||4;
      const str=strokesOn(p.hdcp,h);
      const net=g-str;
      tg+=g; tn+=net; played++;
      const label=getScoreLabel(g,par);
      const cls=label?'mini-sc-'+label:'';
      return '<td class="'+cls+'">'+g+'</td>';
    }).join('');
    const nd=played?tn-cPar:null;
    const ndStr=nd===null?'—':(nd<0?nd:nd>0?'+'+nd:'E');
    const ndColor=nd===null?'#333':nd<0?'#4caf50':nd>0?'#ef5350':'#efefef';
    return '<tr><td>'+p.name.split(' ')[0]+'</td>'+cells+
      '<td style="font-family:monospace;font-weight:700">'+(played?tg:'—')+'</td>'+
      '<td style="font-family:monospace;font-weight:700;color:'+ndColor+'">'+ndStr+'</td>'+
      '</tr>';
  }).join('');
}

// ═══════════════════════════════════════════
//  SCORE ADJUSTMENT
// ═══════════════════════════════════════════
function adjustScore(pid, hole, delta){
  const par = P.pars[hole]||4;
  const current = (P.scores[pid] && P.scores[pid][hole]!==undefined) ? P.scores[pid][hole] : par;
  const next = Math.max(1, Math.min(15, current + delta));
  if(!P.scores[pid]) P.scores[pid]={};
  P.scores[pid][hole] = next;

  // Update display
  const label = getScoreLabel(next, par);
  const snEl = document.getElementById('sn-'+pid);
  const slEl = document.getElementById('sl-'+pid);
  const rowEl = document.getElementById('psr-'+pid);
  if(snEl) snEl.textContent = next;
  if(slEl){ slEl.textContent = label?label.toUpperCase():''; slEl.className='score-label '+label; }
  if(rowEl){ rowEl.className='player-score-row psr-'+label; }

  // Update save button
  const allEntered2 = P.players.length > 0 && P.players.every(function(p){
    return P.scores[p.id] && P.scores[p.id][hole]!==undefined;
  });
  const btn = document.getElementById('save-hole-btn');
  const h = hole;
  if(allEntered2){
    btn.className='save-hole-btn saved';
    btn.textContent = h<P.numHoles-1 ? '✓ Saved — Go to Hole '+(h+2)+' →' : '✓ Round Complete';
  } else {
    btn.className='save-hole-btn';
    btn.textContent = 'Save Hole '+(h+1)+(h<P.numHoles-1?' & Next →':'');
  }

  // Auto-push to sheet
  pushScoresToSheet(hole, pid, next);
}

function saveHole(){
  const h = P.currentHole;
  const par = P.pars[h]||4;

  // Fill any unentered scores with par as default
  P.players.forEach(function(p){
    if(!P.scores[p.id]) P.scores[p.id]={};
    if(P.scores[p.id][h]===undefined){
      P.scores[p.id][h] = par;
      pushScoresToSheet(h, p.id, par);
    }
  });

  saveToCache();
  renderHoleNav();

  // Advance to next hole
  if(h < P.numHoles-1){
    P.currentHole = h+1;
    renderCurrentHole();
    document.querySelector('.hole-nav').scrollLeft = (P.currentHole) * 40;
  } else {
    // Round complete
    renderCurrentHole();
  }
}

function goToHole(h){
  P.currentHole = h;
  renderCurrentHole();
  renderHoleNav();
}

// ═══════════════════════════════════════════
//  LEADERBOARD
// ═══════════════════════════════════════════
function buildLeaderboardFromLocal(){
  // Merge local scores into leaderboard data
  P.leaderboard.forEach(function(lp){
    const local = P.players.find(function(p){return p.id===lp.id;});
    if(local && P.scores[local.id]){
      lp.scores = P.scores[local.id];
    }
    // Compute rel
    const arr = Object.entries(lp.scores||{});
    if(!arr.length){ lp.holesPlayed=0; lp.rel=9999; return; }
    const cPar = P.pars.reduce(function(a,b){return a+(b||4);},0);
    const tn = arr.reduce(function(acc,e){
      const h=+e[0], g=e[1];
      const str=strokesOn(lp.hdcp,h);
      return acc+(g-str);
    },0);
    lp.holesPlayed = arr.length;
    lp.rel = tn - cPar;
  });
}

function renderLeaderboard(){
  buildLeaderboardFromLocal();
  // Also fetch fresh from sheet
  if(P.sheetId && P.tabName) fetchLeaderboard();
  const el = document.getElementById('lb-content');
  P.lastSync = new Date();
  document.getElementById('lb-sync-time').textContent = 'Updated ' + P.lastSync.toLocaleTimeString();

  // Split by flight
  const flightA = P.leaderboard.filter(function(p){return p.flight==='A';})
    .filter(function(p){return p.holesPlayed>0;})
    .sort(function(a,b){return a.rel-b.rel;});
  const flightB = P.leaderboard.filter(function(p){return p.flight==='B';})
    .filter(function(p){return p.holesPlayed>0;})
    .sort(function(a,b){return a.rel-b.rel;});

  const myIds = P.players.map(function(p){return p.id;});
  let html = '';

  function renderFlight(players, flightName){
    if(!players.length) return '<div style="color:#44445a;font-style:italic;font-size:.82rem;padding:8px 0">No scores entered yet</div>';
    let h = '';
    if(players[0].holesPlayed>0){
      const leader = players[0];
      const ls = leader.rel<0?leader.rel.toString():leader.rel>0?'+'+leader.rel:'E';
      h += '<div class="lb-winner-banner">' +
        '<div class="lb-winner-crown">👑</div>' +
        '<div><div class="lb-winner-label">Leading · '+flightName+'</div>' +
        '<div class="lb-winner-name">'+leader.name+'</div></div>' +
        '<div class="lb-winner-score">'+ls+'</div>' +
        '</div>';
    }
    players.forEach(function(p,i){
      const isMe = myIds.indexOf(p.id)>-1;
      const rs = p.rel<0?p.rel.toString():p.rel>0?'+'+p.rel:'E';
      const rCls = p.rel<0?'under':p.rel>0?'over':'even';
      const holesLeft = P.numHoles - p.holesPlayed;
      const pct = Math.round((p.holesPlayed/P.numHoles)*100);
      const progColor = holesLeft===0?'#4caf50':p.holesPlayed>0?'#f5a623':'#3a3a6a';
      const rankCls = i===0?'r1':i===1?'r2':i===2?'r3':'';
      const statusText = holesLeft===0 ? 'Finished' : p.holesPlayed===0 ? 'Not started' : holesLeft+' to go';
      h += '<div class="lb-row'+(isMe?' you-row':'')+'">' +
        '<div class="lb-rank '+rankCls+'">'+(i+1)+'</div>' +
        '<div class="lb-info">' +
          '<div class="lb-name">'+p.name+(isMe?'<span class="you-badge">YOU</span>':'')+'</div>' +
          '<div class="lb-progress">' +
            '<div class="lb-prog-bar"><div class="lb-prog-fill" style="width:'+pct+'%;background:'+progColor+'"></div></div>' +
            '<span class="lb-holes-left">'+statusText+'</span>' +
          '</div>' +
        '</div>' +
        '<div class="lb-score '+rCls+'">'+(p.holesPlayed>0?rs:'—')+'</div>' +
      '</div>';
    });
    return h;
  }

  html += '<div class="flight-divider">'+P.fAN+'</div>';
  html += renderFlight(flightA, P.fAN);
  html += '<div class="flight-divider" style="margin-top:14px">'+P.fBN+'</div>';
  html += renderFlight(flightB, P.fBN);

  el.innerHTML = html;
}

// ═══════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  if(tab==='leaderboard'){
    document.getElementById('screen-leaderboard').classList.add('active');
    document.getElementById('tab-leaderboard').classList.add('active');
    renderLeaderboard();
    // Auto-refresh leaderboard every 30s
    if(P._lbInterval) clearInterval(P._lbInterval);
    P._lbInterval = setInterval(renderLeaderboard, 30000);
  } else {
    document.getElementById('screen-card').classList.add('active');
    document.getElementById('tab-card').classList.add('active');
    if(P._lbInterval){ clearInterval(P._lbInterval); P._lbInterval=null; }
  }
}

// ═══════════════════════════════════════════
//  COMPLETE / ERROR SCREENS
// ═══════════════════════════════════════════
function showCompleteScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});
  document.getElementById('screen-complete').classList.add('active');
}

function showError(msg){
  document.getElementById('loading-screen').innerHTML =
    '<div style="text-align:center;padding:40px;color:#ef5350;font-size:.9rem;line-height:1.6">⚠<br><br>'+msg+'</div>';
}

function setLoading(msg){
  document.getElementById('loading-text').textContent = msg;
}

// ═══════════════════════════════════════════
init();
